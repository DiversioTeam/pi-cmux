# ---------------------------------------------------------------------------
# Publish Workflow
# ---------------------------------------------------------------------------
# Triggered when a version tag (v*) is pushed. This workflow:
#   1. Verifies the git tag matches the version in package.json
#   2. Builds the TypeScript source into dist/
#   3. Publishes the package to the public npm registry (registry.npmjs.org)
#   4. Creates a GitHub Release with auto-generated notes
#
# The package lives in the @diversio org on npmjs.org. Because it is
# public, consumers need zero configuration — just:
#
#     npm install @diversio/pi-cmux
#
# Required secrets:
#   DIVERSIO_TEAM_NPM_TOKEN — an npm Automation token from the @diversio org.
#   Generate at https://www.npmjs.com/settings/diversio/tokens
#   and add to https://github.com/DiversioTeam/pi-cmux/settings/secrets/actions
# ---------------------------------------------------------------------------

name: Publish Package

on:
  push:
    tags:
      - 'v*'

# Top-level permissions are intentionally empty. The publish job declares
# only the permissions it needs (contents: write for GitHub Releases).
permissions: {}

# Prevent concurrent publishes for the same tag if a workflow is re-run.
concurrency:
  group: publish-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Only need contents:write for the gh release create step.
    # No packages:write needed — we publish to npmjs.org, not GitHub Packages.
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      # setup-node with registry-url writes a user-level .npmrc that points
      # npm at the public registry. All subsequent npm commands (ci, view,
      # publish) use this registry. The NODE_AUTH_TOKEN env var provides the
      # auth token for publish (and is harmless for read-only commands on
      # public packages).
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 24
          package-manager-cache: false
          registry-url: https://registry.npmjs.org

      # Clean install from lockfile. All dependencies (including
      # @mariozechner/pi-coding-agent) are available on the public npm
      # registry, so no GitHub Packages auth is needed.
      - name: Install dependencies
        run: npm ci

      # Safety gate: the git tag (e.g. v0.1.0) must match the version field
      # in package.json. This prevents accidentally publishing the wrong
      # version because of a typo in the tag.
      - name: Verify tag matches package version
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./package.json').version")"
          TAG="${GITHUB_REF_NAME}"
          if [[ "$TAG" != "v$VERSION" ]]; then
            echo "Tag $TAG does not match package version v$VERSION" >&2
            exit 1
          fi

      # Compile TypeScript into dist/. The prepublishOnly script also runs
      # this, but we build explicitly here so the "verify pack contents"
      # check (if added in the future) can inspect the dist/ output.
      - name: Build package
        run: npm run build

      # Idempotency check: if this version already exists on npm, skip the
      # publish step. This makes the workflow safe to re-run (e.g. after a
      # transient network failure) without erroring on "version already
      # exists".
      - name: Check whether version is already published
        id: published-version
        env:
          NODE_AUTH_TOKEN: ${{ secrets.DIVERSIO_TEAM_NPM_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./package.json').version")"
          if npm view "@diversio/pi-cmux@${VERSION}" version --registry=https://registry.npmjs.org >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      # Publishes the package to npmjs.org. The prepublishOnly script
      # (npm run build) runs automatically before publish, ensuring dist/
      # is always fresh at publish time.
      #
      # zizmor: ignore[use-trusted-publishing] — we intentionally use an
      # npm Automation token (DIVERSIO_TEAM_NPM_TOKEN) rather than OIDC trusted
      # publishing. npm's trusted publishing requires a GitHub Actions
      # specific linkage that we will adopt separately.
      - name: Publish package
        if: steps.published-version.outputs.published != 'true'
        # --access public is required because scoped packages (@diversio/...)
        # default to private on npm. Without it, npm rejects the publish
        # with a misleading 404 if the account lacks a paid plan.
        run: npm publish --access public # zizmor: ignore[use-trusted-publishing]
        env:
          NODE_AUTH_TOKEN: ${{ secrets.DIVERSIO_TEAM_NPM_TOKEN }}

      # Create a GitHub Release for the tag. Uses the auto-generated
      # release notes (--generate-notes) which pulls in merged PRs since
      # the last release. Uses github.token which is automatically scoped
      # to the contents:write permission we declared above.
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME already exists"
          else
            gh release create "$GITHUB_REF_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$GITHUB_REF_NAME" \
              --generate-notes \
              --verify-tag
          fi
