name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.head.repo.full_name || github.repository }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  build-and-pack:
    name: Build & Pack (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        node-version: [22, 24]
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Verify public exports
        run: |
          node --input-type=module <<'EOF'
          const expected = [
            'CMUX_TIMEOUT_MS',
            'SPLIT_BOOT_DELAY_MS',
            'buildPiCommand',
            'buildShellCommand',
            'execCmux',
            'identifyCaller',
            'isInsideCmux',
            'notify',
            'openSplit',
            'openWorkspace',
            'resolvePiLauncher',
            'shellEscape',
            'wrapSpawnedCommand',
          ].sort();

          const mod = await import('./dist/index.js');
          const actual = Object.keys(mod).sort();

          if (JSON.stringify(actual) !== JSON.stringify(expected)) {
            console.error('Unexpected exports');
            console.error('actual  :', actual);
            console.error('expected:', expected);
            process.exit(1);
          }
          EOF

      - name: Verify pack contents
        run: |
          npm pack --dry-run --json > /tmp/pi-cmux-pack.json
          node <<'EOF'
          const fs = require('node:fs');
          const pack = JSON.parse(fs.readFileSync('/tmp/pi-cmux-pack.json', 'utf8'))[0];
          const files = pack.files.map((file) => file.path).sort();
          const disallowed = files.filter((path) =>
            path.startsWith('src/') ||
            path === 'tsconfig.json' ||
            path === 'AGENTS.md' ||
            path === 'CLAUDE.md' ||
            path === 'CONTRIBUTING.md' ||
            path === 'SECURITY.md' ||
            path.startsWith('.github/')
          );
          if (disallowed.length > 0) {
            console.error('Unexpected files in published tarball:', disallowed);
            process.exit(1);
          }
          if (!files.includes('dist/index.js') || !files.includes('dist/index.d.ts')) {
            console.error('Built entrypoints missing from published tarball');
            process.exit(1);
          }
          if (!files.includes('LICENSE') || !files.includes('README.md') || !files.includes('package.json')) {
            console.error('Expected metadata files missing from published tarball');
            process.exit(1);
          }
          EOF

  ci-status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [build-and-pack]
    if: always()
    steps:
      - name: Check CI status
        env:
          BUILD_AND_PACK_RESULT: ${{ needs.build-and-pack.result }}
        run: |
          if [ "$BUILD_AND_PACK_RESULT" != "success" ]; then
            echo "CI failed!"
            echo "Build & Pack: $BUILD_AND_PACK_RESULT"
            exit 1
          fi
          echo "All CI checks passed!"
